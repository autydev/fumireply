version: 2
updates:
  # --- npm ecosystems --------------------------------------------------------
  # cooldown はサプライチェーン攻撃対策。新しく公開されたバージョンは
  # 公開直後の汚染版(乗っ取られた publish)を避けるため、一定期間経過後に
  # 初めて PR 化する。pnpm/bun の `minimumReleaseAge` 相当を Dependabot 側で実現する。
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /webhook
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /ai-worker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # --- GitHub Actions --------------------------------------------------------
  # Actions 自体もサプライチェーンの一部。SHA pin 推奨だが、まず Dependabot で追跡する。
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  # --- Terraform providers / modules ----------------------------------------
  - package-ecosystem: terraform
    directory: /terraform
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
