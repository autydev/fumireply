name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'

# Cancel superseded runs on the same PR to save minutes.
concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    name: fmt + validate + plan (envs/review)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/envs/review
    permissions:
      id-token: write # OIDC role assume (wired in Phase 2 T029)
      contents: read
      pull-requests: write # post plan output as a PR comment
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'

      - name: terraform fmt -check -recursive
        working-directory: terraform
        run: terraform fmt -check -recursive

      # NOTE: The steps below require an OIDC-federated IAM role.
      # Until Phase 2 T029 (github-actions-oidc module) is applied, plan will
      # fail with auth errors — this workflow is intentionally wired now so
      # infra PRs in Phase 2 surface plan output from the first commit.
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_PLAN_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: terraform init
        if: ${{ vars.AWS_PLAN_ROLE_ARN != '' }}
        run: terraform init -input=false

      - name: terraform validate
        if: ${{ vars.AWS_PLAN_ROLE_ARN != '' }}
        run: terraform validate

      - name: terraform plan
        if: ${{ vars.AWS_PLAN_ROLE_ARN != '' }}
        id: plan
        run: |
          terraform plan -input=false -no-color -out=tfplan | tee plan.txt
          {
            echo 'plan<<EOF'
            cat plan.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post plan to PR
        if: ${{ vars.AWS_PLAN_ROLE_ARN != '' && steps.plan.outputs.plan != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan }}`
            const body = [
              '### Terraform Plan (envs/review)',
              '```hcl',
              plan.slice(0, 60000),
              '```',
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
